[pytest]
testpaths = meepmeep/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    accuracy: marks tests that validate numerical accuracy
    edge_case: marks edge case and boundary condition tests
